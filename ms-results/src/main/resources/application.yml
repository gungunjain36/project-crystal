server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ms-results
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crystal_results}
    username: ${DB_USERNAME:crystal}
    password: ${DB_PASSWORD:crystal}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:ms-results-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.crystal.msresults.model.dto"
        spring.json.value.default.type: com.crystal.msresults.model.dto.ScanResultMessage

kafka:
  topics:
    scan-results: ${KAFKA_TOPIC_SCAN_RESULTS:scan-results}

app:
  api-key: ${API_KEY:dev-secret-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
