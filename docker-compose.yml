version: "3.9"

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: crystal-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: crystal-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: crystal-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic scan-jobs        --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic scan-results     --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic scan-jobs.DLT   --replication-factor 1 --partitions 1
      echo 'Kafka topics created: scan-jobs, scan-results, scan-jobs.DLT'
      "

  postgres:
    image: postgres:16-alpine
    container_name: crystal-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-crystal_results}
      POSTGRES_USER: ${DB_USERNAME:-crystal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crystal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-crystal} -d ${DB_NAME:-crystal_results}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Python Scanner ───────────────────────────────────────────────────────

  ms-scanner:
    build:
      context: ./ms-scanner
      dockerfile: Dockerfile
    container_name: crystal-ms-scanner
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_SCAN_JOBS: scan-jobs
      KAFKA_TOPIC_SCAN_RESULTS: scan-results
      KAFKA_TOPIC_SCAN_JOBS_DLT: scan-jobs.DLT
      KAFKA_CONSUMER_GROUP: ms-scanner-group
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      # SQLite stored on named volume — survives container restarts
      DB_PATH: /app/data/scanner.db
    volumes:
      - scanner_db:/app/data

  # ─── Microservices ────────────────────────────────────────────────────────

  ms-gateway:
    build:
      context: ./ms-gateway
      dockerfile: Dockerfile
    container_name: crystal-ms-gateway
    depends_on:
      ms-intake:
        condition: service_healthy
      ms-results:
        condition: service_healthy
      ms-alert:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      API_KEY: ${API_KEY:-dev-secret-key}
      MS_INTAKE_URL: http://ms-intake:8081
      MS_RESULTS_URL: http://ms-results:8082
      MS_ALERT_URL: http://ms-alert:8083
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ms-intake:
    build:
      context: ./ms-intake
      dockerfile: Dockerfile
    container_name: crystal-ms-intake
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_SCAN_JOBS: scan-jobs
      API_KEY: ${API_KEY:-dev-secret-key}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ms-results:
    build:
      context: ./ms-results
      dockerfile: Dockerfile
    container_name: crystal-ms-results
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_SCAN_RESULTS: scan-results
      KAFKA_CONSUMER_GROUP: ms-results-group
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-crystal_results}
      DB_USERNAME: ${DB_USERNAME:-crystal}
      DB_PASSWORD: ${DB_PASSWORD:-crystal}
      JPA_DDL_AUTO: update
      API_KEY: ${API_KEY:-dev-secret-key}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ms-alert:
    build:
      context: ./ms-alert
      dockerfile: Dockerfile
    container_name: crystal-ms-alert
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_SCAN_RESULTS: scan-results
      KAFKA_CONSUMER_GROUP: ms-alert-group
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_ALERTS_ENABLED: ${SLACK_ALERTS_ENABLED:-true}
      ALERT_SEVERITIES: ${ALERT_SEVERITIES:-high,critical}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Web Client ───────────────────────────────────────────────────────────

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: crystal-client
    depends_on:
      ms-gateway:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      VITE_GATEWAY_URL: http://localhost:8080
      VITE_API_KEY: ${API_KEY:-dev-secret-key}

volumes:
  postgres_data:
  scanner_db:

networks:
  default:
    name: crystal-network
